name: Build & Attach Android APK

# ------------------------------------------------------------------
# Triggers:
#   - push of a v* tag (e.g. v1.0.0)  -> builds + attaches APK to that release
#   - workflow_dispatch                -> manual trigger for testing
#
# This workflow does NOT create or overwrite the GitHub release — it
# only APPENDS the APK(s) to the release that the user (or another
# workflow, like tauri-action for Windows) has already created. Result:
# the same release page shows Windows + Android binaries side by side.
# ------------------------------------------------------------------
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Workflow-level permissions (modern best practice): only what the job
# actually needs. The job inherits this; softprops/action-gh-release uses
# `contents: write` to upload assets to the release.
permissions:
  contents: write

jobs:
  android:
    name: Build Android APK (signed, release)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust (stable) + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            src-tauri/gen/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          # Tauri 2 default NDK version (must match what gradle expects)
          ndk: '26.1.10909125'
          # Tauri 2 build.gradle.kts uses compileSdk 34
          platforms: android-34
          build-tools: 34.0.0
          cmake-version: '3.22.1'

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      # ----------------------------------------------------------------
      # Fail fast if any of the 4 required secrets are missing. This must
      # run BEFORE any keystore write so we never leave a half-configured
      # keystore.properties on disk for a failed build.
      # ----------------------------------------------------------------
      - name: Fail early if keystore secrets are missing
        if: ${{ !secrets.ANDROID_KEYSTORE_BASE64 || !secrets.ANDROID_KEYSTORE_PASSWORD || !secrets.ANDROID_KEY_ALIAS || !secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "::error::One or more required Android signing secrets are missing."
          echo "::error::Add these 4 secrets in Settings → Secrets and variables → Actions:"
          echo "::error::  - ANDROID_KEYSTORE_BASE64"
          echo "::error::  - ANDROID_KEYSTORE_PASSWORD"
          echo "::error::  - ANDROID_KEY_ALIAS"
          echo "::error::  - ANDROID_KEY_PASSWORD"
          echo "::error::See README.md > 'انتشار خودکار (CI/CD)' for instructions."
          exit 1

      # ----------------------------------------------------------------
      # Restore the release keystore from a single base64 secret. The
      # .keystore file is NEVER committed (see .gitignore), so CI must
      # reconstruct it locally. The properties file is also written from
      # secrets — neither the keystore nor its credentials ever touch the
      # repo or the build logs.
      # ----------------------------------------------------------------
      - name: Restore release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          mkdir -p src-tauri/keystore
          echo -n "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/keystore/release.keystore
          chmod 600 src-tauri/keystore/release.keystore
          echo "[keystore] restored $(wc -c < src-tauri/keystore/release.keystore) bytes"
          # Sanity-check the keystore is actually a valid JKS with the right
          # password. Catches malformed/placeholder secrets early with a clear
          # error instead of a confusing "Invalid keystore format" from gradle.
          keytool -list -keystore src-tauri/keystore/release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" >/dev/null \
            || { echo "::error::Keystore is invalid or ANDROID_KEYSTORE_PASSWORD is wrong"; exit 1; }
          echo "[keystore] verified OK"

      - name: Write keystore.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > src-tauri/keystore/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF
          chmod 600 src-tauri/keystore/keystore.properties
          echo "[keystore.properties] written (size $(wc -c < src-tauri/keystore/keystore.properties) bytes)"

      - name: Build static frontend
        run: npm run build:static

      - name: Build Android APK (signed, release)
        run: npx tauri android build --apk

      # ----------------------------------------------------------------
      # Verify the release APK is actually signed with our release key,
      # NOT the debug key. Catches a silent signing-config failure
      # (e.g. wrong alias, wrong password) before we publish.
      # ----------------------------------------------------------------
      - name: Verify APK is signed with the release key
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          # Pick the first (any) arm64 APK for verification
          APK="src-tauri/gen/android/app/build/outputs/apk/release/app-arm64-v8a-release.apk"
          if [ ! -f "$APK" ]; then
            APK=$(ls src-tauri/gen/android/app/build/outputs/apk/release/*.apk | head -1)
          fi
          echo "[verify] using APK: $APK"
          # Find the latest apksigner from the installed build-tools
          APKSIGNER=$(ls -1 $ANDROID_HOME/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner not found in \$ANDROID_HOME/build-tools/"
            exit 1
          fi
          echo "[verify] apksigner: $APKSIGNER"
          # Run apksigner once and capture the full output. We then parse the
          # cert subject from that captured output (avoids invoking apksigner
          # twice and the second call's `Subject:` grep format risk).
          # NOTE: the `if !` wrapper is required — a bare `VAR=$(cmd)` swallows
          # cmd's exit code, so a failed apksigner would silently pass.
          if ! VERIFY_OUTPUT=$("$APKSIGNER" verify --verbose --print-certs "$APK" 2>&1); then
            echo "::error::apksigner verify failed (APK not signed, corrupted, or apksigner missing)"
            echo "$VERIFY_OUTPUT"
            exit 1
          fi
          echo "$VERIFY_OUTPUT"
          # apksigner output format varies between build-tools versions:
          # newer = `Subject: CN=...`, older = `Signer #1 certificate DN: ...`,
          # very old = `Owner: ...`. Match all three to be version-portable.
          SUBJECT=$(echo "$VERIFY_OUTPUT" | grep -iE '(Subject|DN|Owner):' | head -1)
          if [ -z "$SUBJECT" ]; then
            echo "::error::Could not extract cert subject from apksigner output"
            echo "::error::apksigner version: $($APKSIGNER --version 2>&1 || echo unknown)"
            exit 1
          fi
          echo "[verify] cert subject: $SUBJECT"
          if echo "$SUBJECT" | grep -qi 'CN=Android Debug'; then
            echo "::error::APK is signed with the DEBUG key, not the release key!"
            echo "::error::Check ANDROID_KEYSTORE_BASE64 / _PASSWORD / _ALIAS secrets."
            exit 1
          fi

      # ----------------------------------------------------------------
      # Rename the per-ABI APKs to user-friendly, shell-safe filenames.
      # Tauri 2 emits generic names like `app-arm64-v8a-release.apk`; the
      # release page looks cleaner with `sni-scanner-<version>-<abi>.apk`
      # (lowercase, no spaces) so users can type / curl the name directly.
      # ----------------------------------------------------------------
      - name: Rename APKs for distribution
        env:
          TAG: ${{ github.ref_name }}
        run: |
          cd src-tauri/gen/android/app/build/outputs/apk/release
          VERSION=${TAG#v}
          for apk in app-*-release.apk; do
            [ -e "$apk" ] || continue
            ABI="${apk#app-}"
            ABI="${ABI%-release.apk}"
            mv "$apk" "sni-scanner-${VERSION}-${ABI}.apk"
          done
          echo "=== Renamed APKs ==="
          ls -la *.apk

      # ----------------------------------------------------------------
      # Attach the APK(s) to the release that matches the pushed tag.
      # softprops/action-gh-release will:
      #   - if release exists (Windows workflow already created it): append
      #   - if release does not exist: create it with just the APK(s)
      # We do NOT pass `body` so any existing release notes are preserved.
      # ----------------------------------------------------------------
      - name: Upload APKs to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
          overwrite_files: false

      # ----------------------------------------------------------------
      # Best-effort cleanup of the keystore + properties on the runner.
      # `if: always()` so it runs even on failure. The next job/runner
      # gets a fresh image, but this reduces the window in which a
      # captured process could read the secrets.
      # ----------------------------------------------------------------
      - name: Clean up signing material from runner
        if: always()
        run: |
          rm -f src-tauri/keystore/release.keystore
          rm -f src-tauri/keystore/keystore.properties
          echo "[cleanup] removed keystore + properties from runner"
